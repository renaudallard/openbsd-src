# OpenBSD Userland Fuzzing Targets
# Format: name:srcdir:seeds:args:status
#
# name    - target identifier (binary name, output dirs)
# srcdir  - source directory relative to repository root
# seeds   - seed corpus directory under fuzz/seeds/
# args    - program arguments (@@ = AFL input file, absent = stdin mode)
# status  - (optional) false_positive, ubsan_only, reported, skip

